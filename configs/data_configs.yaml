# List of tickers and news sources for FinLagX
market:
  equities:
    - ^GSPC
    - ^NDX
    - ^DJI
    - ^N225
    - ^FTSE
    - ^GDAXI
    - ^NSEI
  commodities:
    - CL=F
    - GC=F
    - HG=F
    - SI=F
  fx:
    - JPY=X
    - EURUSD=X
    - GBPUSD=X
    - CNY=X
  volatility_bonds:
    - ^VIX
    - ^TNX
  emerging:
    - EEM
    - ^BVSP
  crypto:
    - BTC-USD

news:
  # RSS feeds / seed URLs — add or remove as you like
  rss:
    - https://finance.yahoo.com/news/rssindex
    - https://www.reutersagency.com/feed/?best-topics=business-finance&post_type=best
    - https://www.reuters.com/business/finance/rss
    - https://www.bloomberg.com/feed/podcast/etf-report.xml
    - https://www.investing.com/rss/news.rss
  # optional: domains to limit article downloads to (lowercase)
  allowed_domains:
    - finance.yahoo.com
    - reuters.com
    - investing.com
    - bloomberg.com
